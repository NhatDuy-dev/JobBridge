name: jobbridge

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: jobbridge:local
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /app/data/jobbridge.db
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - jobbridge_data:/app/data
    tmpfs:
      - /tmp:size=16m,mode=1777
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    stop_grace_period: 10s

volumes:
  jobbridge_data:
    name: jobbridge_data
