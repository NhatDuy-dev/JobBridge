name: jobbridge

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: jobbridge:local
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://jobbridge:${POSTGRES_PASSWORD:-jobbridge}@postgres:5432/jobbridge
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    tmpfs:
      - /tmp:size=16m,mode=1777
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    stop_grace_period: 10s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobbridge
      POSTGRES_USER: jobbridge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobbridge}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - jobbridge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobbridge -d jobbridge"]
      interval: 5s
      timeout: 3s
      retries: 10
    security_opt:
      - no-new-privileges:true

volumes:
  jobbridge_postgres_data:
    name: jobbridge_postgres_data
